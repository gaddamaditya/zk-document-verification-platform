kind = "web"
previewPath = "/"
title = "ZK Document Verification"
version = "1.0.0"
id = "artifacts/zkp-verify"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20770

[services.development]
run = "pnpm --filter @workspace/zkp-verify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zkp-verify", "run", "build" ]
serve = "static"
publicDir = "artifacts/zkp-verify/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20770"
BASE_PATH = "/"
